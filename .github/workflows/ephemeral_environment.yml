name: Ephemeral Environment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Fetch base
        run: git fetch --depth=1 origin ${{ github.event.workflow_run.pull_requests[0].base.sha }}

      - name: 'Filter paths'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
          filters: |
            app:
              - 'fermentation_station/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'Dockerfile'
              - 'utils/argo_app_writer.py'

  ephemeral-environment-setup:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: fermentation-station-agent
      - name: check out argo cd control repo
        uses: actions/checkout@v4
        with:
          repository: lukasb27/fermentation-station-argocd-control
          token: ${{ secrets.ARGO_CD_REPO_TOKEN }}
          path: fermentation-station-argocd-control
      - name: Install Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.13'
      - name: Install jinja2
        run: pip install jinja2
      - name: Run YAML generator
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: python3 fermentation-station-agent/utils/argo_app_writer.py
      - name: Copy YAML file to new repo and push
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          LOWER_BRANCH=$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]')
          cp ${LOWER_BRANCH}.yaml fermentation-station-argocd-control/apps/${LOWER_BRANCH}.yaml
          cd fermentation-station-argocd-control
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${LOWER_BRANCH}.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add ArgoCD application for PR ${PR_NUMBER} (Branch: ${BRANCH_NAME})"
            git push
          fi