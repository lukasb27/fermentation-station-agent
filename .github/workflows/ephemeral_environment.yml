name: Ephemeral Environment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Diagnostic Summary
        run: |
          echo "### 🔍 Workflow Run Diagnostic" >> $GITHUB_STEP_SUMMARY
          echo "* **CI Conclusion:** ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Triggering Branch:** ${{ github.event.workflow_run.head_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Verify CI Success
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "❌ CI workflow did not succeed. Skipping ephemeral environment setup." >> $GITHUB_STEP_SUMMARY
          exit 0 # We exit 0 so the job itself doesn't "fail", but logic stops here

      - name: Checkout head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # Fetch full history for the head branch

      - name: Get Base SHA
        id: base-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Try to get Base SHA from the workflow_run pull_requests context (most reliable)
          BASE_SHA=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].base.sha // empty')
          
          # 2. Fallback to GitHub CLI if context is empty
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA=$(gh pr list --repo ${{ github.repository }} --head "${{ github.event.workflow_run.head_branch }}" --json baseRefOid --jq '.[0].baseRefOid // empty')
          fi
          
          # 3. Final fallback to origin/main if still empty
          if [ -z "$BASE_SHA" ]; then
            echo "⚠️ Could not determine PR base SHA. Falling back to default branch for comparison." >> $GITHUB_STEP_SUMMARY
            # Use github.event.repository.default_branch for the default branch name
            BASE_SHA="origin/${{ github.event.repository.default_branch }}"
          fi
          
          # Ensure the base SHA is fetched if it's a remote ref
          if [[ "$BASE_SHA" == "origin/"* ]]; then
            git fetch origin "${BASE_SHA#origin/}"
          fi

          echo "* **Target Base SHA:** \`${BASE_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Head SHA:** \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: 'Filter paths'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          base: ${{ steps.base-info.outputs.base_sha }}
          filters: |
            app:
              - 'fermentation_station/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'Dockerfile'
              - 'utils/argo_app_writer.py'
              - 'utils/templates/**'

      - name: Filter Summary
        run: |
          echo "* **App Changes Detected:** ${{ steps.filter.outputs.app }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.filter.outputs.app }}" == "false" ]; then
            echo "⏭️ No relevant files changed. Setup will be skipped." >> $GITHUB_STEP_SUMMARY
          fi

  ephemeral-environment-setup:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: fermentation-station-agent
      - name: check out argo cd control repo
        uses: actions/checkout@v4
        with:
          repository: lukasb27/fermentation-station-argocd-control
          token: ${{ secrets.ARGO_CD_REPO_TOKEN }}
          path: fermentation-station-argocd-control
      - name: Install Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.13'
      - name: Install jinja2
        run: pip install jinja2
      - name: Get PR Number
        id: get-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR number associated with the branch
          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number')
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "Error: No open pull request found for branch ${{ github.event.workflow_run.head_branch }}."
            exit 1
          fi
          
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
      - name: Run YAML generator
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ steps.get-pr.outputs.pr_number }}
        run: python3 fermentation-station-agent/utils/argo_app_writer.py
      - name: Copy YAML file to new repo and push
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ steps.get-pr.outputs.pr_number }}
        run: |
          LOWER_BRANCH=$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          cp ${LOWER_BRANCH}.yaml fermentation-station-argocd-control/apps/${LOWER_BRANCH}.yaml
          cd fermentation-station-argocd-control
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${LOWER_BRANCH}.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add ArgoCD application for PR ${PR_NUMBER} (Branch: ${BRANCH_NAME})"
            git push
          fi