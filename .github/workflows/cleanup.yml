name: Cleanup Ephemeral Environment

on:
  pull_request:
    types: [closed]

jobs:
  delete-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ArgoCD control repo
        uses: actions/checkout@v4
        with:
          repository: lukasb27/fermentation-station-argocd-control
          token: ${{ secrets.ARGO_CD_REPO_TOKEN }}

      - name: Remove YAML file
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # Standardize the branch name to match the creation logic
          LOWER_BRANCH=$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]')
          FILE_PATH="${LOWER_BRANCH}.yaml"

          # Only proceed if the file exists
          if [ -f "$FILE_PATH" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            rm "$FILE_PATH"
            git add "$FILE_PATH"
            git commit -m "Cleanup: Remove ArgoCD app for closed PR (Branch: ${LOWER_BRANCH})"
            git push
          else
            echo "File $FILE_PATH not found, nothing to clean up."
          fi