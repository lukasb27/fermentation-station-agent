apiVersion: batch/v1
kind: Job
metadata:
  name: integ-tests
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
      - name: integ-test
        image: lukasball/fermentation-station-agent-integ-tests:latest
        volumeMounts:
        - name: token-volume
          mountPath: /etc/github
          readOnly: true
        env:
        - name: PR_NUMBER
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['prNumber']
        - name: COMMIT_SHA
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['commitSha']
      volumes:
      - name: token-volume
        secret:
          secretName: github-pr-token
      restartPolicy: Never
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
