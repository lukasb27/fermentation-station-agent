apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ APP_NAME }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:lukasb27/fermentation-station-agent.git
    targetRevision: HEAD
    path: k8s
    kustomize:
      images:
        - {{ IMAGE }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ NAMESPACE }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true